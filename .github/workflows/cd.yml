name: CD - Deploy
'on':
  workflow_run:
    workflows:
      - CI - Build and Push Docker Images
    types:
      - completed
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/SkillPulse
            git pull
            chmod +x deploy.sh
            ./deploy.sh
