name: CD - Deploy

on:
  workflow_run:
    workflows:
      - CI - Build and Push Docker Images
    types:
      - completed
    branches:
      - main

  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~

            if [ ! -d "SkillPulse" ]; then
              git clone -b blu-grren-deployment https://github.com/YOUR_USERNAME/SkillPulse.git
            fi

            cd SkillPulse
            git fetch origin
            git checkout blu-grren-deployment
            git pull origin blu-grren-deployment

            chmod +x deploy.sh
            ./deploy.sh